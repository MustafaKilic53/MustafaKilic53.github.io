<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modaltrans Web Request Quote</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="form-container">
    <form action="https:///app.modaltrans.com/roster/web_request_quotes" method="post">

      <input type="hidden" id="patron_token" name="web_request_quote[patron_token]" value="Y_D96kOpGcnwdfKg-9Bx0w" required>

      <input type="hidden" name="web_request_quote[datas][lead_class]" value="standard">
      <input type="hidden" name="web_request_quote[datas][origin_country_id]" value="TR">
      <input type="hidden" name="web_request_quote[datas][destination_country_id]" value="TR">

      <div class="field">
        <label for="name">Name <span class="req">*</span></label>
        <input type="text" id="name" name="web_request_quote[name]" placeholder="John Smith" required>
      </div>

      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input type="email" id="email" name="web_request_quote[email]" placeholder="Example@email.com" required>
      </div>

      <div class="field">
        <label for="company_name">Company <span class="req">*</span></label>
        <input type="text" id="company_name" name="web_request_quote[company_name]" placeholder="Company name" required>
      </div>

      <div class="field">
        <label for="tax_no">Tax No</label>
        <input type="text" id="tax_no" name="web_request_quote[tax_no]" placeholder="Tax number">
      </div>

      <div class="field">
        <label for="trans_mode">Mode of Transport <span class="req">*</span></label>
        <select id="trans_mode" name="web_request_quote[datas][trans_mode]" required>
          <option value="" disabled selected>Select</option>
          <option value="sea">Sea Freight</option>
          <option value="air">Air Freight</option>
          <option value="road">Road</option>
          <option value="courier">Courier</option>
        </select>
      </div>

      <div class="field radio-row" data-show="sea-fcl sea-lcl">
        <label class="radio-option">
          <input type="radio" name="web_request_quote[datas][full_partial]" value="full" checked> FCL
        </label>
        <label class="radio-option">
          <input type="radio" name="web_request_quote[datas][full_partial]" value="partial"> LCL
        </label>
      </div>

      <div class="field field-inline" data-show="road">
        <label for="full_partial_road">Full trailer load or Less trailer load</label>
        <select id="full_partial_road" name="web_request_quote[datas][full_partial]">
          <option value="full">FTL</option>
          <option value="partial">LTL</option>
        </select>
      </div>

      <div data-show="air courier">
        <input type="hidden" name="web_request_quote[datas][full_partial]" value="partial">
      </div>

      <div class="field field-inline" data-show="sea-fcl sea-lcl air">
        <label for="origin_port">Origin port</label>
        <input type="text" id="origin_port" name="web_request_quote[datas][origin_port]">
      </div>

      <div class="field field-inline" data-show="sea-fcl sea-lcl air">
        <label for="destination_port">Destination port</label>
        <input type="text" id="destination_port" name="web_request_quote[datas][destination_port]">
      </div>

      <div class="field field-inline" data-show="sea-fcl">
        <label for="container_size">Container Size</label>
        <select id="container_size" name="web_request_quote[datas][container_size]">
          <option value="20DC">20DC</option>
          <option value="40DC">40DC</option>
          <option value="40HQ">40HQ</option>
          <option value="45HQ">45HQ</option>
        </select>
      </div>

      <div class="field field-inline" data-show="sea-fcl">
        <label for="container_count">No. of Containers</label>
        <input type="number" id="container_count" name="web_request_quote[datas][container_count]" min="1">
      </div>

      <div class="field field-inline" data-show="sea-lcl air courier">
        <label for="total_package">No. of Packages</label>
        <input type="number" id="total_package" name="web_request_quote[datas][total_package]" min="1">
      </div>

      <div class="field field-inline" data-show="sea-lcl air">
        <label for="total_weight">Total Weight</label>
        <input type="number" id="total_weight" name="web_request_quote[datas][total_weight]" min="0" step="0.01">
      </div>

      <div class="field" data-show="sea-lcl air road courier">
        <span class="dim-title">Dimension per Package</span>
        <div class="dim-row">
          <label for="dimension1">Length</label>
          <input type="number" id="dimension1" name="web_request_quote[datas][dimension1]" min="0" step="0.01">
          <label for="dimension2">Width</label>
          <input type="number" id="dimension2" name="web_request_quote[datas][dimension2]" min="0" step="0.01">
          <label for="dimension3">Height</label>
          <input type="number" id="dimension3" name="web_request_quote[datas][dimension3]" min="0" step="0.01">
        </div>
      </div>

      <div class="field field-inline" data-show="sea-lcl air road courier">
        <label for="gross_weight">Gross Weight</label>
        <input type="number" id="gross_weight" name="web_request_quote[datas][gross_weight]" min="0" step="0.01">
      </div>

      <hr class="divider">

      <h3 class="section-title">Shipment Details</h3>

      <div class="field field-inline">
        <label for="cargo_ready_date">Cargo ready date</label>
        <input type="date" id="cargo_ready_date" name="web_request_quote[datas][cargo_ready_date]">
      </div>

      <div class="field field-inline">
        <label for="incoterms">Incoterms</label>
        <select id="incoterms" name="web_request_quote[datas][incoterms]">
          <option value="" disabled selected>Select</option>
          <option value="CFR">CFR</option>
          <option value="CIF">CIF</option>
          <option value="CIP">CIP</option>
          <option value="CPT">CPT</option>
          <option value="DAP">DAP</option>
          <option value="DAT">DAT</option>
          <option value="DDP">DDP</option>
          <option value="DDU">DDU</option>
          <option value="DPU">DPU</option>
          <option value="EXW">EXW</option>
          <option value="FAS">FAS</option>
          <option value="FCA">FCA</option>
          <option value="FOB">FOB</option>
          <option value="FOR">FOR</option>
          <option value="FOT">FOT</option>
        </select>
      </div>

      <div class="field field-inline" data-show="sea-fcl sea-lcl air">
        <label for="origin_address">Collection address <span class="req">*</span></label>
        <input type="text" id="origin_address" name="web_request_quote[datas][origin_address]" required>
      </div>

      <div class="field field-inline" data-show="sea-fcl sea-lcl air">
        <label for="destination_address">Delivery address <span class="req">*</span></label>
        <input type="text" id="destination_address" name="web_request_quote[datas][destination_address]" required>
      </div>

      <div class="field field-inline" data-show="road courier">
        <label for="origin_address_rc">Origin port</label>
        <input type="text" id="origin_address_rc" name="web_request_quote[datas][origin_address]" required>
      </div>

      <div class="field field-inline" data-show="road courier">
        <label for="destination_address_rc">Destination port</label>
        <input type="text" id="destination_address_rc" name="web_request_quote[datas][destination_address]" required>
      </div>

      <div class="field field-inline">
        <label for="other_services">Other services</label>
        <input type="text" id="other_services" name="web_request_quote[datas][other_services]">
      </div>

      <input type="hidden" id="redirect_url" name="web_request_quote[redirect_url]" value="https://supremefreight.com/" required>

      <div mdl-web-request="recaptcha"></div>

      <button type="submit" class="submit-btn">SUBMIT</button>

      <div class="consent">
        <input type="radio" id="consent" name="consent" required>
        <label for="consent" class="consent-text">
          I consent to my submitted data being collected and stored via this form. The submitted
          data in this form collects your full name, email address, phone number, company, freight
          services and message. Please <a href="#">click here</a> to view more information about how we protect
          and manage your submitted data.
        </label>
      </div>

    </form>
  </div>

  <script>
    (function () {
      var modeSelect = document.getElementById('trans_mode');
      var fclRadios = document.querySelectorAll('.radio-row input[type="radio"]');
      var sections = document.querySelectorAll('[data-show]');

      function currentState() {
        var mode = modeSelect.value;
        if (mode === 'sea') {
          var checked = document.querySelector('.radio-row input[type="radio"]:checked');
          return (checked && checked.value === 'partial') ? 'sea-lcl' : 'sea-fcl';
        }
        return mode;
      }

      function refresh() {
        var state = currentState();
        sections.forEach(function (section) {
          var visible = section.getAttribute('data-show').split(' ').indexOf(state) !== -1;
          section.style.display = visible ? '' : 'none';
          section.querySelectorAll('input, select').forEach(function (el) {
            el.disabled = !visible;
          });
        });
      }

      modeSelect.addEventListener('change', refresh);
      fclRadios.forEach(function (radio) { radio.addEventListener('change', refresh); });
      refresh();
      window.addEventListener('pageshow', function () {
        modeSelect.form.reset();
        refresh();
      });
    })();
  </script>

  <script src="https:///app.modaltrans.com/roster/web_requests/cdn.js"></script>
</body>

</html>
